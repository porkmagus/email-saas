name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ./backend
    services:
      postgres:
        image: postgres:17.10
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: email_saas_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7.4.9
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          pip install uv
          uv venv .venv
          uv pip install -e ".[dev]"
      - name: Lint with ruff
        run: |
          uv pip install ruff
          .venv/bin/ruff check api/ tests/
      - name: Run migrations
        run: |
          .venv/bin/alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/email_saas_test
      - name: Run tests
        run: |
          .venv/bin/pytest tests/ -v --tb=short
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/email_saas_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-test-secret-key-32-chars-long
          STRIPE_SECRET_KEY: sk_test_ci
          STRIPE_WEBHOOK_SECRET: whsec_ci
          STALWART_BASE_URL: http://localhost:8080
          STALWART_API_TOKEN: ci-token

  frontend:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24.15.0"
          cache: "npm"
          cache-dependency-path: ./frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Type check
        run: npx tsc --noEmit

  docker:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t email-saas-backend ./backend
      - name: Build frontend image
        run: docker build -t email-saas-frontend ./frontend
      - name: Compose smoke test
        run: |
          cp .env.example .env
          docker compose up -d --wait
          sleep 10
          curl -f http://localhost/api/v1/health || exit 1
          docker compose down
