# Email SaaS — Local Development Stack
# Production: See docs/SETUP.md for VPS deployment
#
# Services:
#   postgres   — PostgreSQL 17.10 (app data, migrations)
#   redis      — Redis 7.4.9 (cache, sessions, queue)
#   backend    — FastAPI + uvicorn (API server)
#   frontend   — Nginx serving built React app
#
# Usage:
#   cp .env.example .env
#   docker compose up -d
#   docker compose exec backend alembic upgrade head
#   docker compose exec backend python scripts/seed_admin.py

services:
  postgres:
    image: postgres:17.10
    container_name: email_saas_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-email_saas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-email_saas_dev}
      POSTGRES_DB: ${POSTGRES_DB:-email_saas}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-email_saas} -d ${POSTGRES_DB:-email_saas}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - email_saas

  redis:
    image: redis:7.4.9
    container_name: email_saas_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - email_saas

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: email_saas_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://email_saas:email_saas_dev@postgres:5432/email_saas
      REDIS_URL: redis://redis:6379/0
      ALEMBIC_CONFIG: /app/migrations/alembic.ini
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - email_saas

  # Stalwart Mail Server — local development
  # Production: See docs/SETUP.md for production deployment
  stalwart:
    image: stalwartlabs/stalwart:latest
    container_name: email_saas_stalwart
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"   # HTTP admin / JMAP
      - "127.0.0.1:25:25"       # SMTP
      - "127.0.0.1:587:587"     # SMTP submission
      - "127.0.0.1:465:465"     # SMTP TLS
      - "127.0.0.1:143:143"     # IMAP
      - "127.0.0.1:993:993"     # IMAP TLS
      - "127.0.0.1:4190:4190"   # Sieve
    volumes:
      - stalwart_data:/opt/stalwart-mail
      - ./infra/stalwart/config.json:/etc/stalwart/config.json:ro
    entrypoint: ["/usr/local/bin/stalwart"]
    command: ["--config", "/etc/stalwart/config.json"]
    networks:
      - email_saas

  # Frontend served by Nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: email_saas_frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:80"
    networks:
      - email_saas
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s

  # Bulwark Webmail — JMAP-native modern webmail for Stalwart
  bulwark:
    image: ghcr.io/bulwarkmail/webmail:latest
    container_name: email_saas_bulwark
    restart: unless-stopped
    environment:
      HOSTNAME: 0.0.0.0
      PORT: 3000
      JMAP_SERVER_URL: http://stalwart:8080
      ALLOW_CUSTOM_JMAP_ENDPOINT: "true"
      STALWART_FEATURES: "true"
      LOG_FORMAT: text
      LOG_LEVEL: info
    ports:
      - "127.0.0.1:3002:3000"
    networks:
      - email_saas
    depends_on:
      - stalwart
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
  # roundcube:
  #   image: roundcube/roundcubemail:latest
  #   container_name: email_saas_roundcube
  #   restart: unless-stopped
  #   environment:
  #     ROUNDCUBEMAIL_DEFAULT_HOST: stalwart
  #     ROUNDCUBEMAIL_DEFAULT_PORT: 143
  #     ROUNDCUBEMAIL_SMTP_SERVER: stalwart
  #     ROUNDCUBEMAIL_SMTP_PORT: 587
  #   ports:
  #     - "127.0.0.1:8081:80"
  #   networks:
  #     - email_saas
  #   depends_on:
  #     - stalwart

  # Optional: local Certbot for SSL (dev-only, use real VPS for production)
  certbot:
    image: certbot/certbot:v5.6.0
    container_name: email_saas_certbot
    volumes:
      - certbot_data:/etc/letsencrypt
      - ./frontend/dist:/var/www/html:ro
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 12h; certbot renew; done'"
    profiles:
      - ssl
    networks:
      - email_saas

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  stalwart_data:
    driver: local
  certbot_data:
    driver: local

networks:
  email_saas:
    driver: bridge
