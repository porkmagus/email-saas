server {
    listen 80;
    server_name localhost;

    # Bulwark webmail
    location / {
        proxy_pass http://email_saas_bulwark:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    # Stalwart JMAP under /jmap/ to avoid CORS
    location /jmap/ {
        proxy_pass http://stalwart:8080/jmap/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_buffering off;
    }

    # Stalwart admin under /admin/ (optional)
    location /admin/ {
        proxy_pass http://stalwart:8080/admin/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    # Stalwart .well-known/jmap served directly by proxy
    location /.well-known/jmap {
        default_type application/json;
        alias /etc/nginx/jmap-well-known.json;
    }

    # Stalwart .well-known under /.well-known/ (except jmap)
    location /.well-known/ {
        proxy_pass http://stalwart:8080/.well-known/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }
}
